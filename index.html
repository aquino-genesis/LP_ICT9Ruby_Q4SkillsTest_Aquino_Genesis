<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

        <title>Login</title>
    </head>

    <body>
        <div class="card mx-auto my-5 w-50 h-auto p-5 text-center">
            <div class="mb-5" style="user-select: none;">
                <i class="bi bi-person-circle display-1"></i><br>
                <h1>Login</h1>
            </div>

            <form onsubmit="return authenticate()" class="d-flex flex-column gap-3">
                <g>
                    <label for="uname">Username</label>
                    <input class="form-control" id="uname" type="text" placeholder="Enter username..." required>
                </g>

                <g>
                    <label for="pword">Password</label>
                    <input class="form-control" id="pword" type="password" placeholder="Enter password..." required>
                </g>

                <g class="text-start">
                    <g class="d-flex justify-content-start flex-row" style="user-select: none;">
                        <input type="checkbox" id="staylogged" onclick="document.getElementById('stayloginfo').style.visibility = (this.checked ? 'visible' : 'hidden')"
                        ><label for="staylogged">&nbsp;&nbsp;Stay logged in?</label>
                    </g>
                    
                    <p id="stayloginfo" class="text-muted fst-italic" style="visibility: hidden;">
                        Your session will stay active on this device.
                    </p>
                </g>

                <g class="flex-row">
                    <input class="btn btn-primary" type="submit" id="login" value="Login">
                    <input class="btn" type="reset" value="Cancel">
                </g>
            </form>
        </div>

        <script>
            let attemptCount = 0;
            const loginBtn = document.getElementById("login");

            function authenticate() {
                const userName = document.getElementById("uname").value;
                const userPass = document.getElementById("pword").value;

                if (userName === "DimensionReset" && userPass === "myPass123ABC") {
                    window.alert("Welcome, " + userName);
                    window.location.href = "main.html";
                } else {
                    attemptCount ++;

                    if (attemptCount == 3) {
                        window.alert("Invalid username or password. Account locked. (Attempt "+attemptCount+"/3)")
                        loginBtn.disabled = true;
                    } else {
                        window.alert("Invalid username or password. Please try again. (Attempt "+attemptCount+"/3)")
                    }
                }

                return false
            }
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
    </body>
</html>
